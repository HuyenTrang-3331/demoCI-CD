services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    restart: always
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - db_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: huyentrang110224/demo-app:latest
    container_name: spring_app
    depends_on:
      - db
    ports:
      - "80:80"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=demo;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: YourStrong!Pass123

  frontend:
    build: ./frontend
    image: huyentrang110224/frontend-app:latest
    container_name: frontend_app
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: