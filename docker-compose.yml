services:

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: demo
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    image: huyentrang110224/spring_app:latest
    container_name: spring_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/demo
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456

  frontend:
    build: ./frontend
    image: huyentrang110224/frontend_app:latest
    container_name: frontend_app
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: