name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: huyentrang110224/demo-app:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: huyentrang110224/frontend-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy webhook
        run: |
          REPO="huyentrang110224/demo-app"
          CONTAINER_PORT=80
          MAX_RETRIES=5
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."

            RESPONSE=$(curl -sS --connect-timeout 30 --max-time 120 \
              -w "\n%{http_code}" -X POST \
              "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT" \
              || echo -e "\n000")

            CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "HTTP: $CODE"

            if [ "$CODE" = "524" ] || [ "$CODE" = "000" ]; then
              echo "Server timeout (524/connection error) - deploy may still be processing. Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              continue
            fi

            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "Deploy OK"
              echo "$BODY"
              exit 0
            fi

            echo "Deploy FAIL (HTTP $CODE)"
            echo "$BODY"
            exit 1
          done

          echo "All $MAX_RETRIES attempts resulted in timeout (524). Deploy may still be running on server."
          exit 0