name: Deploy lên DevOps Classroom

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Gọi webhook deploy
        run: |
          REPO="huyentrang110224/demo-app:latest"
          CONTAINER_PORT=80

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại."
            echo "$BODY"
            exit 1
          fi

          echo "Deploy thành công."
          echo "$BODY"