<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Spring Boot API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      background: #ff7b00;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9d3c;
      transform: scale(1.05);
    }

    .api-box {
      margin-top: 30px;
      text-align: left;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
    }

    code {
      color: #00ffcc;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Spring Boot API</h1>
  <p>Backend is running successfully</p>

  <a class="btn" href="/api/products">📦 Test API</a>
  <a class="btn" href="/actuator/health">❤️ Health Check</a>

  <div class="api-box">
    <h3>📌 API Endpoints</h3>
    <p><code>GET /api/products</code></p>
    <p><code>POST /api/products</code></p>
    <p><code>PUT /api/products/{id}</code></p>
    <p><code>DELETE /api/products/{id}</code></p>
  </div>
</div>

</body>
</html>
